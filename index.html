<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VSCode Task Manager</title>
    <style>
        :root {
            --primary-color: #0366d6;
            --bg-color: #f6f8fa;
            --text-color: #24292e;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        header {
            background: #24292e;
            color: white;
            padding: 2rem 1rem;
            text-align: center;
        }
        .container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
            flex: 1;
        }
        .hero {
            text-align: center;
            padding: 3rem 0;
        }
        .btn-download {
            display: inline-block;
            background-color: #2ea44f;
            color: white;
            padding: 1rem 2rem;
            font-size: 1.25rem;
            font-weight: bold;
            text-decoration: none;
            border-radius: 6px;
            margin-top: 1rem;
            transition: background 0.2s;
        }
        .btn-download:hover {
            background-color: #2c974b;
        }
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-top: 3rem;
        }
        .feature-card {
            background: white;
            padding: 1.5rem;
            border-radius: 8px;
            border: 1px solid #e1e4e8;
        }
        footer {
            text-align: center;
            padding: 2rem;
            font-size: 0.9rem;
            color: #6a737d;
        }
        .license-tag {
            display: inline-block;
            background: #e1e4e8;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<header>
    <h1>Software Name</h1>
    <p>ここにソフトの短いキャッチコピーを入れる</p>
</header>

<div class="container">
    <section class="hero">
        <h2>最新バージョン v1.0.0 リリース中</h2>
        <p>Windows 10 / 11 対応</p>
        <a href="https://github.com/pumila99/リポジトリ名/releases" class="btn-download">今すぐダウンロード</a>
    </section>

    <section class="features">
